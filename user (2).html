<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PS Store</title>
<style>
/* =====================================================
   TOKENS — "Techno" theme
   ===================================================== */
:root {
  --bg: #0a0e17;
  --bg-elevated: #10151f;
  --panel: #131a26;
  --panel-2: #182030;
  --line: #232c3d;
  --line-bright: #2c3850;

  --cyan: #00e5ff;
  --cyan-soft: rgba(0, 229, 255, 0.14);
  --violet: #7c5cff;
  --violet-soft: rgba(124, 92, 255, 0.16);
  --amber: #ffb648;

  --text-1: #eef2f8;
  --text-2: #9aa7bd;
  --text-3: #5d6a82;

  --success: #2bd97c;
  --danger: #ff5470;

  --radius-lg: 18px;
  --radius-md: 14px;
  --radius-sm: 10px;

  --font-display: 'Chakra Petch', 'Rajdhani', system-ui, sans-serif;
  --font-body: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  --font-mono: 'JetBrains Mono', 'Roboto Mono', monospace;

  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--text-1);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

body {
  min-height: 100vh;
  padding-bottom: calc(82px + var(--safe-bottom));
  background-image:
    radial-gradient(circle at 15% -10%, rgba(0, 229, 255, 0.08), transparent 45%),
    radial-gradient(circle at 100% 10%, rgba(124, 92, 255, 0.10), transparent 40%);
  background-attachment: fixed;
}

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
img { max-width: 100%; display: block; }
.hidden { display: none !important; }

/* Light mode override */
body.light {
  --bg: #f3f5f9;
  --bg-elevated: #ffffff;
  --panel: #ffffff;
  --panel-2: #eef1f6;
  --line: #e1e6ee;
  --line-bright: #cdd5e2;
  --text-1: #131a26;
  --text-2: #5b6679;
  --text-3: #8b96a8;
}
body.light .topbar { background: rgba(255,255,255,0.85); }
body.light .scan-grid { opacity: 0.04; }

/* =====================================================
   TOP BAR
   ===================================================== */
.topbar {
  position: sticky;
  top: 0;
  z-index: 30;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  background: rgba(10, 14, 23, 0.82);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--line);
}

.icon-btn {
  width: 42px;
  height: 42px;
  border-radius: var(--radius-sm);
  background: var(--panel);
  border: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-2);
  transition: border-color .15s, color .15s;
}
.icon-btn:active { transform: scale(0.94); }
.icon-btn svg { width: 20px; height: 20px; }

.brand {
  text-align: center;
  flex: 1;
}
.brand-name {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 21px;
  letter-spacing: 0.5px;
  color: var(--text-1);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.brand-name .accent { color: var(--cyan); }
.brand-status {
  font-size: 11px;
  font-family: var(--font-mono);
  letter-spacing: 0.6px;
  color: var(--text-3);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-top: 2px;
  text-transform: uppercase;
}
.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--success);
  box-shadow: 0 0 8px var(--success);
  flex-shrink: 0;
}
.status-dot.offline { background: var(--text-3); box-shadow: none; }

/* =====================================================
   CATEGORY STRIP
   ===================================================== */
.category-strip {
  display: flex;
  gap: 8px;
  padding: 14px 16px 6px;
  overflow-x: auto;
  scrollbar-width: none;
}
.category-strip::-webkit-scrollbar { display: none; }

.chip {
  flex-shrink: 0;
  padding: 9px 16px;
  border-radius: 999px;
  background: var(--panel);
  border: 1px solid var(--line);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-2);
  white-space: nowrap;
  transition: all .15s;
}
.chip.active {
  background: var(--cyan-soft);
  border-color: var(--cyan);
  color: var(--cyan);
  box-shadow: 0 0 14px rgba(0, 229, 255, 0.18);
}
.chip:active { transform: scale(0.96); }

/* =====================================================
   PRODUCT GRID
   ===================================================== */
.content {
  padding: 14px 16px 30px;
}

.section-label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 1.5px;
  color: var(--text-3);
  text-transform: uppercase;
  margin: 18px 2px 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--line);
}

.product-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

.product-card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: border-color .15s, transform .15s;
  position: relative;
}
.product-card:active { transform: scale(0.98); }

.product-card-image {
  position: relative;
  aspect-ratio: 1 / 1;
  background: var(--panel-2);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 18%;
}
.product-card-image img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  border-radius: var(--radius-md);
}

.badge-bonus {
  position: absolute;
  top: 8px;
  right: 8px;
  background: var(--violet);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 7px;
  border-radius: 6px;
  font-family: var(--font-mono);
}

.product-card-body {
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex: 1;
}
.product-title {
  font-size: 13.5px;
  font-weight: 700;
  line-height: 1.3;
  color: var(--text-1);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  min-height: 34px;
}
.product-price {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 14.5px;
  color: var(--cyan);
}
.product-desc {
  font-size: 11.5px;
  color: var(--text-3);
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.btn-buy {
  margin-top: 4px;
  width: 100%;
  padding: 10px;
  border-radius: var(--radius-sm);
  background: var(--panel-2);
  border: 1px solid var(--line-bright);
  color: var(--text-1);
  font-weight: 700;
  font-size: 13px;
  transition: all .15s;
}
.btn-buy:active {
  background: var(--cyan-soft);
  border-color: var(--cyan);
  color: var(--cyan);
}

/* Skeleton loading */
.skeleton-card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.skeleton-shimmer {
  background: linear-gradient(90deg, var(--panel) 25%, var(--panel-2) 50%, var(--panel) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.skeleton-card .skeleton-shimmer:first-child { aspect-ratio: 1/1; }
.skeleton-card .skeleton-line { height: 11px; margin: 12px; border-radius: 4px; }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-3);
}
.empty-state svg { width: 48px; height: 48px; margin: 0 auto 12px; opacity: 0.5; }
.empty-state p { font-size: 13.5px; }

/* =====================================================
   BOTTOM NAV
   ===================================================== */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 30;
  display: flex;
  background: rgba(10, 14, 23, 0.92);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--line);
  padding: 8px 4px calc(8px + var(--safe-bottom));
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 6px 2px;
  color: var(--text-3);
  border-radius: var(--radius-sm);
  transition: color .15s;
}
.nav-item svg { width: 21px; height: 21px; }
.nav-item span { font-size: 10.5px; font-weight: 600; letter-spacing: 0.2px; }
.nav-item.active { color: var(--cyan); }
.nav-item.active svg { filter: drop-shadow(0 0 6px rgba(0,229,255,0.5)); }

/* =====================================================
   FLOATING TELEGRAM BUTTON
   ===================================================== */
.fab-telegram {
  position: fixed;
  right: 16px;
  bottom: calc(96px + var(--safe-bottom));
  z-index: 25;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: linear-gradient(135deg, #29b6f6, #0288d1);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 20px rgba(0, 229, 255, 0.35);
  border: 1px solid rgba(255,255,255,0.15);
}
.fab-telegram svg { width: 24px; height: 24px; color: #fff; }
.fab-telegram:active { transform: scale(0.92); }

/* =====================================================
   SIDE DRAWER
   ===================================================== */
.drawer-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 49;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.drawer-overlay.open { opacity: 1; pointer-events: auto; }

.drawer {
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  width: 78%;
  max-width: 300px;
  background: var(--bg-elevated);
  border-right: 1px solid var(--line);
  z-index: 50;
  transform: translateX(-100%);
  transition: transform .25s ease;
  padding: 20px 18px;
  overflow-y: auto;
}
.drawer.open { transform: translateX(0); }

.drawer-header { margin-bottom: 18px; }
.drawer-title { font-family: var(--font-display); font-size: 19px; font-weight: 700; }
.drawer-sub { font-size: 12px; color: var(--text-3); margin-top: 2px; }

.drawer-link {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 10px;
  border-radius: var(--radius-sm);
  color: var(--text-2);
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 2px;
}
.drawer-link svg { width: 19px; height: 19px; flex-shrink: 0; }
.drawer-link:active { background: var(--panel); }

.drawer-section {
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--line);
}
.drawer-contact-row {
  font-size: 12.5px;
  color: var(--text-3);
  padding: 6px 10px;
}
.drawer-contact-row b { color: var(--text-2); }

/* =====================================================
   ORDER MODAL
   ===================================================== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 59;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }

.modal {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 60;
  background: var(--bg-elevated);
  border-radius: 22px 22px 0 0;
  border-top: 1px solid var(--line-bright);
  max-height: 88vh;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform .28s cubic-bezier(.32,.72,0,1);
  padding: 18px 18px calc(20px + var(--safe-bottom));
}
.modal.open { transform: translateY(0); }

.modal-handle {
  width: 36px;
  height: 4px;
  border-radius: 4px;
  background: var(--line-bright);
  margin: 0 auto 16px;
}

.modal-product-summary {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  margin-bottom: 18px;
}
.modal-product-icon {
  width: 44px;
  height: 44px;
  border-radius: var(--radius-sm);
  background: var(--panel-2);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  overflow: hidden;
}
.modal-product-icon img { width: 100%; height: 100%; object-fit: contain; }
.modal-product-title { font-size: 14px; font-weight: 700; }
.modal-product-price { font-family: var(--font-mono); color: var(--cyan); font-size: 13px; font-weight: 700; margin-top: 2px; }

.modal-close {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--panel);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-2);
}
.modal-close svg { width: 16px; height: 16px; }

.form-group { margin-bottom: 14px; }
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-2);
  margin-bottom: 6px;
  letter-spacing: 0.2px;
}
.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-size: 14px;
  color: var(--text-1);
  font-family: inherit;
  transition: border-color .15s;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  outline: none;
  border-color: var(--cyan);
  box-shadow: 0 0 0 3px var(--cyan-soft);
}
.form-row-split { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.payment-account-card {
  display: none;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  background: var(--violet-soft);
  border: 1px solid var(--violet);
  border-radius: var(--radius-sm);
  margin-bottom: 14px;
}
.payment-account-card.visible { display: flex; }
.payment-account-logo {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 11px;
  font-family: var(--font-mono);
  color: #fff;
}
.payment-account-logo.kbz { background: #1565c0; }
.payment-account-logo.wave { background: #ffb300; color: #1a1300; }
.payment-account-details { flex: 1; min-width: 0; }
.payment-account-name { font-size: 13px; font-weight: 700; color: var(--text-1); }
.payment-account-number {
  font-family: var(--font-mono);
  font-size: 13.5px;
  font-weight: 700;
  color: var(--violet);
  letter-spacing: 0.4px;
}
.payment-account-copy {
  flex-shrink: 0;
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  background: var(--panel);
  border: 1px solid var(--line-bright);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-2);
}
.payment-account-copy svg { width: 15px; height: 15px; }
.payment-account-copy:active { transform: scale(0.92); }

.form-hint {
  font-size: 11.5px;
  color: var(--text-3);
  margin-top: 5px;
}

.btn-submit {
  width: 100%;
  padding: 14px;
  margin-top: 6px;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--cyan), #0098b3);
  color: #04141a;
  font-weight: 700;
  font-size: 14.5px;
  letter-spacing: 0.3px;
  box-shadow: 0 6px 20px rgba(0, 229, 255, 0.25);
}
.btn-submit:active { transform: scale(0.98); }
.btn-submit:disabled { opacity: 0.6; }

.spinner {
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid rgba(4,20,26,0.3);
  border-top-color: #04141a;
  border-radius: 50%;
  animation: spin .6s linear infinite;
  vertical-align: -2px;
  margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* =====================================================
   TOASTS
   ===================================================== */
.toast-container {
  position: fixed;
  top: 14px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 80;
  display: flex;
  flex-direction: column;
  gap: 8px;
  width: 92%;
  max-width: 380px;
  align-items: center;
}
.toast {
  width: 100%;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  background: var(--panel);
  border: 1px solid var(--line-bright);
  font-size: 13px;
  font-weight: 600;
  text-align: center;
  opacity: 0;
  transform: translateY(-12px);
  transition: all .25s;
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.toast-visible { opacity: 1; transform: translateY(0); }
.toast-success { border-color: var(--success); color: var(--success); }
.toast-error { border-color: var(--danger); color: var(--danger); }
.toast-info { border-color: var(--cyan); color: var(--cyan); }

body.modal-open { overflow: hidden; }
</style>
</head>
<body>

  <!-- ===================== TOP BAR ===================== -->
  <header class="topbar">
    <button class="icon-btn" id="menuBtn" aria-label="Menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="brand">
      <div class="brand-name" id="siteName">PS <span class="accent">STORE</span></div>
      <div class="brand-status"><span class="status-dot" id="statusDot"></span><span id="statusText">ADMIN ONLINE</span></div>
    </div>
    <button class="icon-btn" id="themeToggleBtn" aria-label="Toggle theme">
      <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </header>

  <!-- ===================== CATEGORY STRIP ===================== -->
  <div class="category-strip" id="categoryStrip">
    <button class="chip active" data-cat="all">အားလုံး</button>
    <button class="chip" data-cat="mobile_legend">Mobile Legend</button>
    <button class="chip" data-cat="pubg_mobile">PUBG Mobile</button>
    <button class="chip" data-cat="telegram_premium">Telegram Premium</button>
    <button class="chip" data-cat="telegram_account">Telegram Account</button>
  </div>

  <!-- ===================== MAIN CONTENT ===================== -->
  <main class="content">
    <div class="section-label" id="sectionLabel">ALL PRODUCTS</div>

    <div class="product-grid hidden" id="productSkeleton">
      <div class="skeleton-card"><div class="skeleton-shimmer"></div><div class="skeleton-shimmer skeleton-line"></div><div class="skeleton-shimmer skeleton-line" style="width:60%"></div></div>
      <div class="skeleton-card"><div class="skeleton-shimmer"></div><div class="skeleton-shimmer skeleton-line"></div><div class="skeleton-shimmer skeleton-line" style="width:60%"></div></div>
      <div class="skeleton-card"><div class="skeleton-shimmer"></div><div class="skeleton-shimmer skeleton-line"></div><div class="skeleton-shimmer skeleton-line" style="width:60%"></div></div>
      <div class="skeleton-card"><div class="skeleton-shimmer"></div><div class="skeleton-shimmer skeleton-line"></div><div class="skeleton-shimmer skeleton-line" style="width:60%"></div></div>
    </div>

    <div class="product-grid" id="productGrid"></div>

    <div class="empty-state hidden" id="productEmptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a4 4 0 0 1 8 0v2"/></svg>
      <p>ဒီ Category ထဲမှာ Product မရှိသေးပါ</p>
    </div>
  </main>

  <!-- ===================== FLOATING TELEGRAM ===================== -->
  <a class="fab-telegram" id="fabTelegram" href="#" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.5 4.5L2.7 11.9c-1.2.5-1.2 1.2-.2 1.5l4.8 1.5 1.8 5.8c.2.6.4.9.9.9.4 0 .6-.2.9-.5l2.3-2.2 4.8 3.5c.9.5 1.5.2 1.7-.8L24 5.5c.3-1.3-.5-1.9-1.5-1.4l-1 .4z"/></svg>
  </a>

  <!-- ===================== BOTTOM NAV ===================== -->
  <nav class="bottom-nav" id="bottomNav">
    <button class="nav-item active" data-cat="all">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span>HOME</span>
    </button>
    <button class="nav-item" data-cat="telegram_premium,telegram_account">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18.01"/></svg>
      <span>APPS</span>
    </button>
    <button class="nav-item" data-cat="mobile_legend,pubg_mobile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="6"/><circle cx="8" cy="12" r="1.5" fill="currentColor"/><circle cx="16" cy="10.5" r="1" fill="currentColor"/><circle cx="16" cy="13.5" r="1" fill="currentColor"/></svg>
      <span>GAMES</span>
    </button>
    <button class="nav-item" data-cat="telegram_account">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>ACCOUNTS</span>
    </button>
    <a class="nav-item" id="navChannel" href="#" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
      <span>CHANNEL</span>
    </a>
  </nav>

  <!-- ===================== SIDE DRAWER ===================== -->
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="drawer-title" id="drawerSiteName">PS STORE</div>
      <div class="drawer-sub">Trusted Digital Top-up Service</div>
    </div>

    <a class="drawer-link" data-cat="all">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      Home
    </a>
    <a class="drawer-link" data-cat="mobile_legend">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="6"/></svg>
      Mobile Legend
    </a>
    <a class="drawer-link" data-cat="pubg_mobile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="6"/></svg>
      PUBG Mobile
    </a>
    <a class="drawer-link" data-cat="telegram_premium">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M16 8l-7 7-3-3"/></svg>
      Telegram Premium
    </a>
    <a class="drawer-link" data-cat="telegram_account">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      Telegram Account
    </a>

    <div class="drawer-section">
      <div class="drawer-contact-row">Support: <b id="drawerSupportTelegram">—</b></div>
      <div class="drawer-contact-row">Phone: <b id="drawerSupportPhone">—</b></div>
    </div>
  </aside>

  <!-- ===================== ORDER MODAL ===================== -->
  <div class="modal-overlay" id="modalOverlay"></div>
  <div class="modal" id="orderModal">
    <div class="modal-handle"></div>
    <button class="modal-close" id="modalCloseBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>

    <div class="modal-product-summary">
      <div class="modal-product-icon"><img id="modalProductImg" src="" alt=""></div>
      <div>
        <div class="modal-product-title" id="modalProductTitle"></div>
        <div class="modal-product-price" id="modalProductPrice"></div>
      </div>
    </div>

    <form id="orderForm">
      <input type="hidden" id="selectedPackageId">
      <input type="hidden" id="selectedPackageTitle">
      <input type="hidden" id="selectedCategory">
      <input type="hidden" id="orderPrice">

      <div class="form-group">
        <label for="customerName">အမည် *</label>
        <input type="text" id="customerName" placeholder="သင့်အမည်ထည့်ပါ" required>
      </div>

      <div class="form-group">
        <label for="phoneOrTelegram">ဖုန်း / Telegram *</label>
        <input type="text" id="phoneOrTelegram" placeholder="09xxxxxxxxx / @username" required>
      </div>

      <!-- Game fields (Mobile Legend / PUBG) -->
      <div class="form-row-split game-fields hidden">
        <div class="form-group">
          <label for="playerId">Player ID *</label>
          <input type="text" id="playerId" placeholder="123456789">
        </div>
        <div class="form-group">
          <label for="serverId">Server ID *</label>
          <input type="text" id="serverId" placeholder="2001">
        </div>
      </div>

      <!-- Telegram fields (Premium / Account) -->
      <div class="form-group telegram-fields hidden">
        <label for="telegramUsername">Telegram Username *</label>
        <input type="text" id="telegramUsername" placeholder="@username">
      </div>

      <div class="form-group">
        <label for="paymentMethod">ငွေပေးချေမှုနည်းလမ်း *</label>
        <select id="paymentMethod" required>
          <option value="" disabled selected>ရွေးချယ်ပါ</option>
        </select>
      </div>

      <div class="payment-account-card" id="paymentAccountCard">
        <div class="payment-account-logo" id="paymentAccountLogo">PAY</div>
        <div class="payment-account-details">
          <div class="payment-account-name" id="paymentAccountName">—</div>
          <div class="payment-account-number" id="paymentAccountNumber">—</div>
        </div>
        <button type="button" class="payment-account-copy" id="paymentAccountCopyBtn" aria-label="Copy number">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>

      <div class="form-group">
        <label for="transactionId">Transaction ID *</label>
        <input type="text" id="transactionId" placeholder="ငွေလွှဲပြီးရရှိသော Transaction ID ထည့်ပါ" required>
        <p class="form-hint">အပေါ်က Account ကို ငွေလွှဲပြီးရင် ရရှိသည့် Transaction ID ကို ဒီနေရာတွင်ထည့်ပါ</p>
      </div>

      <div class="form-group">
        <label for="orderNote">မှတ်ချက် (Optional)</label>
        <textarea id="orderNote" rows="2" placeholder="ပိုပြောလိုသည်ရှိလျှင်..."></textarea>
      </div>

      <button type="submit" class="btn-submit" id="orderSubmitBtn">Order တင်မည်</button>
    </form>
  </div>

  <!-- ===================== TOASTS ===================== -->
  <div class="toast-container" id="toastContainer"></div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzOeqY8v4at3Xyfd-jl9t3lohKevYAT2JTBLiNuDYTPs6D4iZOOckLkRyhvWnC7jimG/exec";

const CATEGORY_LABELS = {
  all: "ALL PRODUCTS",
  mobile_legend: "MOBILE LEGEND",
  pubg_mobile: "PUBG MOBILE",
  telegram_premium: "TELEGRAM PREMIUM",
  telegram_account: "TELEGRAM ACCOUNT"
};

// Categories that need Player ID + Server ID
const GAME_CATEGORIES = ["mobile_legend", "pubg_mobile"];
// Categories that need a Telegram username field
const TELEGRAM_CATEGORIES = ["telegram_premium", "telegram_account"];

// ===================== API LAYER =====================

async function fetchProducts() {
  const url = APPS_SCRIPT_URL + "?action=getProducts";
  const response = await fetch(url, { method: "GET" });
  const result = await response.json();
  if (!result.success) throw new Error(result.message || "Failed to load products");
  return result.data;
}

async function fetchSettings() {
  const url = APPS_SCRIPT_URL + "?action=getSettings";
  const response = await fetch(url, { method: "GET" });
  const result = await response.json();
  if (!result.success) throw new Error(result.message || "Failed to load settings");
  return result.data;
}

async function submitOrder(orderData) {
  const response = await fetch(APPS_SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ action: "submitOrder", order: orderData })
  });
  return await response.json();
}

// ===================== STATE =====================

let allProducts = [];
let currentCategory = "all";
let currentSelectedProduct = null;

// ===================== RENDERING =====================

function renderProducts() {
  const grid = document.getElementById("productGrid");
  const emptyState = document.getElementById("productEmptyState");

  const filtered = currentCategory === "all"
    ? allProducts
    : allProducts.filter(p => currentCategory.split(",").includes(String(p.category || "").trim().toLowerCase()));

  document.getElementById("sectionLabel").textContent =
    CATEGORY_LABELS[currentCategory] || "PRODUCTS";

  if (!filtered.length) {
    grid.innerHTML = "";
    emptyState.classList.remove("hidden");
    return;
  }
  emptyState.classList.add("hidden");

  const sorted = [...filtered].sort((a, b) => a.sort_order - b.sort_order);

  grid.innerHTML = sorted.map(function (p) {
    const bonusBadge = p.bonus && Number(p.bonus) > 0
      ? `<span class="badge-bonus">+${escapeHtml(p.bonus)}</span>` : "";
    return `
      <article class="product-card" data-id="${escapeHtml(p.id)}">
        <div class="product-card-image">
          <img src="${escapeHtml(p.image_url)}" alt="${escapeHtml(p.title)}" loading="lazy"
               onerror="this.src='https://placehold.co/300x300/131a26/00e5ff?text=PS'">
          ${bonusBadge}
        </div>
        <div class="product-card-body">
          <h3 class="product-title">${escapeHtml(p.title)}</h3>
          ${p.description ? `<p class="product-desc">${escapeHtml(p.description)}</p>` : ""}
          <span class="product-price">${formatNumber(p.price)} ${escapeHtml(p.currency)}</span>
          <button class="btn-buy" data-id="${escapeHtml(p.id)}">အသေးစိတ်ကြည့်ရန်</button>
        </div>
      </article>
    `;
  }).join("");

  grid.querySelectorAll(".btn-buy").forEach(function (btn) {
    btn.addEventListener("click", function () {
      const id = btn.getAttribute("data-id");
      const product = sorted.find(p => p.id === id);
      if (product) openOrderModal(product);
    });
  });
}

function setActiveCategory(cat) {
  currentCategory = cat;

  document.querySelectorAll(".chip").forEach(function (chip) {
    chip.classList.toggle("active", chip.getAttribute("data-cat") === cat);
  });
  document.querySelectorAll(".nav-item[data-cat]").forEach(function (item) {
    item.classList.toggle("active", item.getAttribute("data-cat") === cat);
  });

  renderProducts();
}

// ===================== ORDER MODAL =====================

function openOrderModal(product) {
  currentSelectedProduct = product;

  document.getElementById("modalProductImg").src = product.image_url || "";
  document.getElementById("modalProductTitle").textContent = product.title;
  document.getElementById("modalProductPrice").textContent = `${formatNumber(product.price)} ${product.currency}`;

  document.getElementById("selectedPackageId").value = product.id;
  document.getElementById("selectedPackageTitle").value = product.title;
  document.getElementById("selectedCategory").value = product.category || "";
  document.getElementById("orderPrice").value = product.price;

  // Smart form: toggle field groups by category
  const normalizedCategory = String(product.category || "").trim().toLowerCase();
  const isGame = GAME_CATEGORIES.includes(normalizedCategory);
  const isTelegram = TELEGRAM_CATEGORIES.includes(normalizedCategory);

  document.querySelector(".game-fields").classList.toggle("hidden", !isGame);
  document.getElementById("playerId").required = isGame;
  document.getElementById("serverId").required = isGame;
  if (!isGame) { document.getElementById("playerId").value = ""; document.getElementById("serverId").value = ""; }

  document.querySelector(".telegram-fields").classList.toggle("hidden", !isTelegram);
  document.getElementById("telegramUsername").required = isTelegram;
  if (!isTelegram) document.getElementById("telegramUsername").value = "";

  const modal = document.getElementById("orderModal");
  const overlay = document.getElementById("modalOverlay");
  modal.classList.add("open");
  overlay.classList.add("open");
  document.body.classList.add("modal-open");
}

function closeOrderModal() {
  document.getElementById("orderModal").classList.remove("open");
  document.getElementById("modalOverlay").classList.remove("open");
  document.body.classList.remove("modal-open");
  document.getElementById("orderForm").reset();
  document.getElementById("paymentAccountCard").classList.remove("visible");
  currentSelectedProduct = null;
}

// ===================== DRAWER =====================

function openDrawer() {
  document.getElementById("drawer").classList.add("open");
  document.getElementById("drawerOverlay").classList.add("open");
}
function closeDrawer() {
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("drawerOverlay").classList.remove("open");
}

// ===================== SETTINGS =====================

let paymentAccountsMap = {};

function populatePaymentMethods(settings) {
  if (!settings) return;
  const methods = [];

  if (settings.kbz_enabled !== false && settings.kbz_enabled !== "false") {
    methods.push({ value: "KBZ Pay", label: "KBZ Pay" });
    paymentAccountsMap["KBZ Pay"] = {
      name: settings.kbz_account_name || "",
      number: settings.kbz_account_number || "",
      logoClass: "kbz",
      logoText: "KBZ"
    };
  }
  if (settings.wave_enabled !== false && settings.wave_enabled !== "false") {
    methods.push({ value: "Wave Pay", label: "Wave Pay" });
    paymentAccountsMap["Wave Pay"] = {
      name: settings.wave_account_name || "",
      number: settings.wave_account_number || "",
      logoClass: "wave",
      logoText: "WAVE"
    };
  }

  const select = document.getElementById("paymentMethod");
  if (!methods.length) {
    select.innerHTML = `<option value="" disabled selected>ယာယီမရရှိနိုင်ပါ</option>`;
    return;
  }
  select.innerHTML = `<option value="" disabled selected>ရွေးချယ်ပါ</option>` +
    methods.map(m => `<option value="${escapeHtml(m.value)}">${escapeHtml(m.label)}</option>`).join("");
}

function updatePaymentAccountCard(methodValue) {
  const card = document.getElementById("paymentAccountCard");
  const account = paymentAccountsMap[methodValue];

  if (!account || !account.number) {
    card.classList.remove("visible");
    return;
  }

  document.getElementById("paymentAccountLogo").textContent = account.logoText;
  document.getElementById("paymentAccountLogo").className = "payment-account-logo " + account.logoClass;
  document.getElementById("paymentAccountName").textContent = account.name || "—";
  document.getElementById("paymentAccountNumber").textContent = account.number || "—";
  card.classList.add("visible");
}

function applySettingsToPage(settings) {
  if (!settings) return;

  if (settings.site_name) {
    const nameHtml = `<span>${escapeHtml(settings.site_name)}</span>`;
    document.getElementById("siteName").innerHTML = nameHtml;
    document.getElementById("drawerSiteName").textContent = settings.site_name;
    document.title = settings.site_name;
  }

  if (settings.support_telegram) {
    document.getElementById("drawerSupportTelegram").textContent = settings.support_telegram;
    const handle = String(settings.support_telegram).replace(/^@/, "");
    const tgLink = "https://t.me/" + handle;
    document.getElementById("fabTelegram").href = tgLink;
    document.getElementById("navChannel").href = tgLink;
  }
  if (settings.support_phone) {
    document.getElementById("drawerSupportPhone").textContent = settings.support_phone;
  }
}

// ===================== TOASTS / LOADING =====================

function showToast(message, type) {
  type = type || "info";
  const container = document.getElementById("toastContainer");
  const toast = document.createElement("div");
  toast.className = `toast toast-${type}`;
  toast.textContent = message;
  container.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add("toast-visible"));
  setTimeout(() => { toast.classList.remove("toast-visible"); setTimeout(() => toast.remove(), 300); }, 3500);
}

function setLoading(button, state) {
  if (!button) return;
  if (state) {
    button.disabled = true;
    button.dataset.originalText = button.dataset.originalText || button.textContent;
    button.innerHTML = `<span class="spinner"></span>Processing...`;
  } else {
    button.disabled = false;
    button.textContent = button.dataset.originalText || button.textContent;
  }
}

function setProductsLoading(state) {
  const grid = document.getElementById("productGrid");
  const skeleton = document.getElementById("productSkeleton");
  if (state) { skeleton.classList.remove("hidden"); grid.classList.add("hidden"); }
  else { skeleton.classList.add("hidden"); grid.classList.remove("hidden"); }
}

// ===================== HELPERS =====================

function formatNumber(num) { return Number(num).toLocaleString("en-US"); }
function escapeHtml(str) {
  if (str === undefined || str === null) return "";
  return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}

// ===================== INIT =====================

document.addEventListener("DOMContentLoaded", function () {
  bindUIEvents();
  initApp();
});

async function initApp() {
  await Promise.all([loadSettings(), loadProducts()]);
}

async function loadSettings() {
  try {
    const settings = await fetchSettings();
    applySettingsToPage(settings);
    populatePaymentMethods(settings);
  } catch (err) {
    console.error("Failed to load settings:", err);
  }
}

async function loadProducts() {
  setProductsLoading(true);
  try {
    allProducts = await fetchProducts();
    renderProducts();
  } catch (err) {
    console.error("Failed to load products:", err);
    showToast("Product များ load မရပါ။ ပြန်ကြိုးစားကြည့်ပါ", "error");
  } finally {
    setProductsLoading(false);
  }
}

function bindUIEvents() {
  // Theme toggle
  document.getElementById("themeToggleBtn").addEventListener("click", function () {
    document.body.classList.toggle("light");
  });

  // Drawer
  document.getElementById("menuBtn").addEventListener("click", openDrawer);
  document.getElementById("drawerOverlay").addEventListener("click", closeDrawer);
  document.querySelectorAll(".drawer-link").forEach(function (link) {
    link.addEventListener("click", function () {
      setActiveCategory(link.getAttribute("data-cat"));
      closeDrawer();
    });
  });

  // Category chips
  document.querySelectorAll(".chip").forEach(function (chip) {
    chip.addEventListener("click", function () { setActiveCategory(chip.getAttribute("data-cat")); });
  });

  // Bottom nav (category items only — channel link navigates externally)
  document.querySelectorAll(".nav-item[data-cat]").forEach(function (item) {
    item.addEventListener("click", function () { setActiveCategory(item.getAttribute("data-cat")); });
  });

  // Modal
  document.getElementById("modalCloseBtn").addEventListener("click", closeOrderModal);
  document.getElementById("modalOverlay").addEventListener("click", closeOrderModal);
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape" && document.getElementById("orderModal").classList.contains("open")) closeOrderModal();
  });

  // Payment method -> show account details
  document.getElementById("paymentMethod").addEventListener("change", function (e) {
    updatePaymentAccountCard(e.target.value);
  });

  // Copy account number
  document.getElementById("paymentAccountCopyBtn").addEventListener("click", function () {
    const number = document.getElementById("paymentAccountNumber").textContent;
    if (!number || number === "—") return;
    navigator.clipboard.writeText(number).then(function () {
      showToast("Account Number copy ပြီးပါပြီ", "success");
    }).catch(function () {
      showToast("Copy မရပါ", "error");
    });
  });

  // Order form
  document.getElementById("orderForm").addEventListener("submit", async function (e) {
    e.preventDefault();
    const submitBtn = document.getElementById("orderSubmitBtn");
    const formData = collectOrderFormData();

    const validation = validateOrderForm(formData);
    if (!validation.valid) { showToast(validation.message, "error"); return; }

    setLoading(submitBtn, true);
    try {
      const result = await submitOrder(formData);
      if (result.success) {
        showToast(`Order တင်ပြီးပါပြီ! Order ID: ${result.orderId}`, "success");
        closeOrderModal();
      } else {
        showToast(result.message || "Order တင်မရပါ။ ပြန်ကြိုးစားကြည့်ပါ", "error");
      }
    } catch (err) {
      console.error("Order submission error:", err);
      showToast("Network error။ Internet connection ကိုစစ်ပါ", "error");
    } finally {
      setLoading(submitBtn, false);
    }
  });
}

function collectOrderFormData() {
  return {
    customerName: document.getElementById("customerName").value.trim(),
    phoneOrTelegram: document.getElementById("phoneOrTelegram").value.trim(),
    playerId: document.getElementById("playerId").value.trim(),
    serverId: document.getElementById("serverId").value.trim(),
    telegramUsername: document.getElementById("telegramUsername").value.trim(),
    selectedPackageId: document.getElementById("selectedPackageId").value,
    selectedPackageTitle: document.getElementById("selectedPackageTitle").value,
    category: document.getElementById("selectedCategory").value,
    price: document.getElementById("orderPrice").value,
    paymentMethod: document.getElementById("paymentMethod").value,
    transactionId: document.getElementById("transactionId").value.trim(),
    note: document.getElementById("orderNote").value.trim()
  };
}

function validateOrderForm(data) {
  const requiredFields = [
    { key: "customerName", label: "အမည်" },
    { key: "phoneOrTelegram", label: "ဖုန်း/Telegram" },
    { key: "selectedPackageId", label: "Package" },
    { key: "paymentMethod", label: "ငွေပေးချေမှုနည်းလမ်း" },
    { key: "transactionId", label: "Transaction ID" }
  ];

  const normalizedCategory = String(data.category || "").trim().toLowerCase();

  if (GAME_CATEGORIES.includes(normalizedCategory)) {
    requiredFields.push({ key: "playerId", label: "Player ID" });
    requiredFields.push({ key: "serverId", label: "Server ID" });
  }
  if (TELEGRAM_CATEGORIES.includes(normalizedCategory)) {
    requiredFields.push({ key: "telegramUsername", label: "Telegram Username" });
  }

  for (const field of requiredFields) {
    if (!data[field.key] || String(data[field.key]).trim() === "") {
      return { valid: false, message: `${field.label} ဖြည့်ပေးပါ` };
    }
  }
  return { valid: true };
}
</script>
